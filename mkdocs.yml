site_name: SuprAI
site_description: Rust CLI agent harness — interactive coding assistant with tools, sessions, MCP, and plugins.
site_url: https://iamdeepank.github.io/SuprAI/
repo_url: https://github.com/iamdeepank/SuprAI
repo_name: iamdeepank/SuprAI
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: red
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: red
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started:
    - Quick start: getting-started/quick-start.md
    - Installation: getting-started/installation.md
    - Configuration: getting-started/configuration.md
    - Windows guide: getting-started/windows.md
    - Windows release binaries: windows-install-release.md
  - User guide:
    - CLI usage: guide/cli-usage.md
    - Architecture & concept: guide/architecture.md
    - Navigation & file context: navigation-file-context.md
    - Local OpenAI-compatible providers: local-openai-compatible-providers.md
    - Model compatibility: MODEL_COMPATIBILITY.md
  - Components:
    - RAG service & web UI: rag-web-ui.md
    - Containers: container.md
    - Personal assistant roadmap: personal-assistant-roadmap.md
  - Developer:
    - Rust workspace: developer/rust-workspace.md
    - Building & testing: developer/building.md
    - Contributing: developer/contributing.md
    - Releasing: developer/releasing.md
    - Parity: developer/parity.md
    - Security: developer/security.md
    - Mock parity harness: developer/mock-parity.md
  - Reference:
    - ACP / JSON-RPC status: g011-acp-json-rpc-status-contract.md
    - Events & reports contract: g004-events-reports-contract.md
    - Clone / session metadata: g010-clone-disambiguation-metadata.md
    - MCP lifecycle mapping: g007-mcp-lifecycle-mapping.md
  - Maintainers:
    - Release readiness: g012-final-release-readiness-report.md
    - Roadmap PR goals: roadmap-pr-goals.md
    - PR issue resolution gate: pr-issue-resolution-gate.md
    - Anti-slop triage: anti-slop-triage.md
    - Verification maps:
      - Security (G002): g002-security-verification-map.md
      - Boot / session (G003): g003-boot-session-verification-map.md
      - Events / reports (G004): g004-events-reports-verification-map.md
      - Branch recovery (G005): g005-branch-recovery-verification-map.md
      - Task policy board (G006): g006-task-policy-board-verification-map.md
      - Plugin / MCP (G007): g007-plugin-mcp-verification-map.md
      - Session hygiene (G010): g010-session-hygiene-verification-map.md
      - Ecosystem ops UX (G011): g011-ecosystem-ops-ux-verification-map.md
      - Windows docs release (G009): g009-windows-docs-release-verification-map.md
      - Roadmap pinpoints (G013): g013-roadmap-pinpoints-693-695-verification-map.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/iamdeepank/SuprAI
